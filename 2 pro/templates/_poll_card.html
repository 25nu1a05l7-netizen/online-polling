<div class="poll-card h-100">
  <div class="d-flex justify-content-between align-items-start mb-3">
    <span class="badge rounded-pill text-bg-{{ 'success' if poll.mode == 'quick' else 'primary' }}">{{ 'Quick Poll' if poll.mode == 'quick' else 'Election' }}</span>
    <span class="status-dot {{ 'active' if poll.is_active else 'closed' }}">{{ 'Active' if poll.is_active else 'Closed' }}</span>
  </div>
  <h3>{{ poll.title }}</h3>
  <p>{{ poll.description or 'No description provided.' }}</p>
  <div class="poll-meta">
    <span>{{ poll.total_votes }} votes</span>
    <span>Ends {{ poll.expiry_time.strftime('%d %b %Y, %H:%M') }}</span>
  </div>
  <div class="d-flex gap-2 mt-4">
    <a class="btn btn-primary btn-sm" href="{{ url_for('vote', public_id=poll.public_id) }}">Vote</a>
    <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('results', public_id=poll.public_id) }}">Results</a>
    <form method="post" action="{{ url_for('delete_poll', public_id=poll.public_id) }}" style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this poll?')">
      <button type="submit" class="btn btn-danger btn-sm">Delete</button>
    </form>
  </div>
</div>
